name: Azure CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  run-azure-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secrets
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" && echo "CLIENT_ID OK" || echo "CLIENT_ID MISSING"
          test -n "${{ secrets.AZURE_TENANT_ID }}" && echo "TENANT_ID OK" || echo "TENANT_ID MISSING"
          test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" && echo "SUBSCRIPTION_ID OK" || echo "SUBSCRIPTION_ID MISSING"

      - name: Login Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure account
        run: az account show --output table